<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vigilante · Code Ebel</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    :root {
      --dark-bg: #0a0a12;
      --panel-bg: #12121e;
      --border-color: #4fc3f7;
      --text-primary: #e0e0e0;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--dark-bg);
      color: var(--text-primary);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 1rem;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      padding: 1.5rem 0;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 2rem;
    }
    
    h1 {
      color: var(--border-color);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    
    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }
    
    .panel {
      background: var(--panel-bg);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .panel h2 {
      color: var(--border-color);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    
    .mission-card {
      background: rgba(20, 20, 30, 0.8);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    
    .mission-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .mission-id {
      font-weight: bold;
      color: var(--border-color);
    }
    
    .mission-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    
    .status-pending { background: var(--warning); color: black; }
    .status-approved { background: var(--success); color: white; }
    .status-rejected { background: var(--danger); color: white; }
    
    .mission-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    
    .btn-whatsapp {
      background: #25d366;
      color: white;
    }
    
    .btn-assign {
      background: #673ab7;
      color: white;
    }
    
    .btn-approve {
      background: var(--success);
      color: white;
    }
    
    .btn-reject {
      background: var(--danger);
      color: white;
    }
    
    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }
    
    .verification-section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #333;
    }
    
    .input-group {
      margin: 1rem 0;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
    }
    
    .input-group input, .input-group select {
      width: 100%;
      padding: 10px;
      background: #1a1a2e;
      border: 2px solid var(--border-color);
      color: white;
      border-radius: 6px;
    }
    
    .live-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--warning);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    
    .empty {
      color: #999;
      font-style: italic;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>👁️‍🗨️ Panel del Vigilante · Code Ebel</h1>
      <p>Supervisa, verifica y aprueba misiones en tiempo real</p>
    </header>
    
    <div class="dashboard">
      <!-- Panel izquierdo: Misiones disponibles y asignadas -->
      <div class="panel">
        <h2>📋 Misiones Disponibles</h2>
        <div id="availableMissions">
          <p>Cargando misiones...</p>
        </div>
        
        <h2 style="margin-top: 2rem;">🎯 Misiones Asignadas</h2>
        <div id="assignedMissions">
          <p>No hay misiones asignadas.</p>
        </div>
      </div>
      
      <!-- Panel derecho: Asignación y verificación -->
      <div class="panel">
        <h2>📤 Asignar Misión</h2>
        
        <div class="input-group">
          <label for="hunterIdAssign">ID del Cazador:</label>
          <input type="text" id="hunterIdAssign" placeholder="LH-XXXX" maxlength="9" pattern="LH-[0-9]{4}">
        </div>
        
        <div class="input-group">
          <label for="missionSelect">Seleccionar Misión:</label>
          <select id="missionSelect">
            <option value="">Cargando misiones...</option>
          </select>
        </div>
        
        <div class="input-group">
          <label for="zoneAssign">Zona:</label>
          <select id="zoneAssign">
            <option value="CABA">📍 Ciudad de Buenos Aires (CABA)</option>
            <option value="Avellaneda">🚂 Avellaneda</option>
            <option value="Lanús">🌳 Lanús</option>
            <option value="Lomas de Zamora">🏘️ Lomas de Zamora</option>
          </select>
        </div>
        
        <button class="btn-assign" onclick="asignarMision()">
          📤 Asignar Misión al Cazador
        </button>
        
        <div class="verification-section">
          <h2>🎥 Verificación en Vivo</h2>
          
          <div class="input-group">
            <label for="hunterIdVerify">ID del Cazador:</label>
            <input type="text" id="hunterIdVerify" placeholder="LH-XXXX" maxlength="9">
          </div>
          
          <div class="input-group">
            <label for="missionType">Tipo de Misión:</label>
            <input type="text" id="missionType" placeholder="Selecciona una misión primero" readonly>
          </div>
          
          <button class="btn-whatsapp" onclick="solicitarConsentimiento()">
            📞 Solicitar consentimiento para videollamada
          </button>
          
          <div style="margin-top: 1.5rem;">
            <h3>🔴 En verificación</h3>
            <p><span class="live-indicator"></span> Esperando respuesta del cazador...</p>
            
            <div class="mission-actions">
              <button class="btn-approve" onclick="aprobarMision()">✅ Aprobar Misión</button>
              <button class="btn-reject" onclick="rechazarMision()">❌ Rechazar Misión</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
      apiKey: "AIzaSyDvMo1LPD_FGk-Ahju8oN7WEn9w0B5bqUE",
      authDomain: "let-s-hunt.firebaseapp.com",
      databaseURL: "https://let-s-hunt-default-rtdb.firebaseio.com",
      projectId: "let-s-hunt",
      storageBucket: "let-s-hunt.firebasestorage.app",
      messagingSenderId: "787017812046",
      appId: "1:787017812046:web:da098b2361df4dda995b1f"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // === AUTENTICACIÓN DEL VIGILANTE ===
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'lh-admin-2026.html';
        return;
      }
      
      // Verificar rol de vigilante
      const userRef = db.ref(`usuarios/${user.uid}`);
      userRef.once('value').then((snapshot) => {
        if (!snapshot.exists() || snapshot.val().rol !== 'admin') {
          alert('Acceso denegado. Solo vigilantes autorizados.');
          auth.signOut();
          return;
        }
        loadAvailableMissions();
        loadAssignedMissions();
      });
    });

    // === CARGAR MISIONES DISPONIBLES ===
    function loadAvailableMissions() {
      const missionsDiv = document.getElementById('availableMissions');
      const select = document.getElementById('missionSelect');
      
      missionsDiv.innerHTML = '<p>Cargando misiones...</p>';
      select.innerHTML = '<option value="">Cargando misiones...</option>';
      
      db.ref('misiones').once('value')
        .then((snapshot) => {
          if (!snapshot.exists()) {
            missionsDiv.innerHTML = '<p class="empty">No hay misiones disponibles.</p>';
            select.innerHTML = '<option value="">No hay misiones</option>';
            return;
          }
          
          const missions = snapshot.val();
          let html = '';
          let options = '';
          
          Object.keys(missions).forEach(key => {
            const mission = missions[key];
            html += `
              <div class="mission-card">
                <div class="mission-header">
                  <span class="mission-id">${mission.titulo}</span>
                </div>
                <p>${mission.descripcion}</p>
                <p><strong>Duración:</strong> ${mission.duracion} | <strong>Puntos:</strong> ${mission.puntos}</p>
              </div>
            `;
            options += `<option value="${key}">${mission.titulo}</option>`;
          });
          
          missionsDiv.innerHTML = html;
          select.innerHTML = '<option value="">Selecciona una misión...</option>' + options;
        })
        .catch(error => {
          console.error('Error al cargar misiones:', error);
          missionsDiv.innerHTML = '<p class="empty">Error al cargar misiones.</p>';
          select.innerHTML = '<option value="">Error al cargar</option>';
        });
    }

    // === CARGAR MISIONES ASIGNADAS ===
    function loadAssignedMissions() {
      const missionsDiv = document.getElementById('assignedMissions');
      missionsDiv.innerHTML = '<p>Cargando misiones asignadas...</p>';
      
      db.ref('misiones_asignadas').orderByChild('timestamp').limitToLast(10).once('value')
        .then((snapshot) => {
          if (!snapshot.exists()) {
            missionsDiv.innerHTML = '<p class="empty">No hay misiones asignadas.</p>';
            return;
          }
          
          let html = '';
          const missions = snapshot.val();
          Object.values(missions).reverse().forEach(mission => {
            const statusClass = mission.status === 'approved' ? 'status-approved' : 
                              mission.status === 'rejected' ? 'status-rejected' : 'status-pending';
            const statusText = mission.status === 'approved' ? 'Aprobada' : 
                             mission.status === 'rejected' ? 'Rechazada' : 'Pendiente';
            
            html += `
              <div class="mission-card">
                <div class="mission-header">
                  <span class="mission-id">${mission.hunterId}</span>
                  <span class="mission-status ${statusClass}">${statusText}</span>
                </div>
                <p><strong>Misión:</strong> ${mission.missionTitle}</p>
                <p><strong>Zona:</strong> ${mission.zona}</p>
                <p><strong>Asignada:</strong> ${new Date(mission.timestamp).toLocaleString('es-AR')}</p>
                <div class="mission-actions">
                  <button class="btn-whatsapp" onclick="iniciarVerificacion('${mission.hunterId}', '${mission.missionTitle}')">
                    👁️ Verificar
                  </button>
                </div>
              </div>
            `;
          });
          missionsDiv.innerHTML = html;
        })
        .catch(error => {
          console.error('Error al cargar misiones asignadas:', error);
          missionsDiv.innerHTML = '<p class="empty">Error al cargar misiones asignadas.</p>';
        });
    }

    // === ASIGNAR MISIÓN ===
    function asignarMision() {
      const hunterId = document.getElementById('hunterIdAssign').value.trim().toUpperCase();
      const missionKey = document.getElementById('missionSelect').value;
      const zona = document.getElementById('zoneAssign').value;
      
      if (!hunterId || !/LH-[0-9]{4}/.test(hunterId)) {
        alert('⚠️ Ingresa un ID de cazador válido (ej: LH-1234)');
        return;
      }
      
      if (!missionKey) {
        alert('⚠️ Selecciona una misión');
        return;
      }
      
      if (!zona) {
        alert('⚠️ Selecciona una zona');
        return;
      }
      
      // Obtener detalles de la misión
      db.ref(`misiones/${missionKey}`).once('value')
        .then((snapshot) => {
          if (!snapshot.exists()) {
            alert('❌ Misión no encontrada');
            return;
          }
          
          const missionData = snapshot.val();
          
          // Crear registro de asignación
          const assignmentKey = `${hunterId}_${Date.now()}`;
          const assignmentData = {
            hunterId: hunterId,
            missionKey: missionKey,
            missionTitle: missionData.titulo,
            missionDescription: missionData.descripcion,
            zona: zona,
            status: 'pending',
            assigned_by: auth.currentUser.uid,
            timestamp: Date.now()
          };
          
          // Guardar en Firebase
          db.ref(`misiones_asignadas/${assignmentKey}`).set(assignmentData)
            .then(() => {
              alert(`✅ Misión "${missionData.titulo}" asignada a ${hunterId}`);
              loadAssignedMissions();
              
              // Limpiar formulario
              document.getElementById('hunterIdAssign').value = '';
              document.getElementById('missionSelect').selectedIndex = 0;
            })
            .catch(error => {
              console.error('Error al asignar misión:', error);
              alert('❌ Error al asignar misión');
            });
        });
    }

    // === INICIAR VERIFICACIÓN ===
    function iniciarVerificacion(hunterId, missionTitle) {
      document.getElementById('hunterIdVerify').value = hunterId;
      document.getElementById('missionType').value = missionTitle;
      
      // Scroll to verification panel
      document.querySelector('.panel:last-child').scrollIntoView({ behavior: 'smooth' });
    }

    // === SOLICITAR CONSENTIMIENTO POR WHATSAPP ===
    function solicitarConsentimiento() {
      const hunterId = document.getElementById('hunterIdVerify').value.trim().toUpperCase();
      const missionType = document.getElementById('missionType').value.trim();
      
      if (!hunterId || !/LH-[0-9]{4}/.test(hunterId)) {
        alert('⚠️ Ingresa un ID de cazador válido (ej: LH-1234)');
        return;
      }
      
      if (!missionType) {
        alert('⚠️ Selecciona una misión primero');
        return;
      }
      
      const numeroSoporte = "1125082484";
      const mensaje = encodeURIComponent(
        `👁️‍🗨️ *EL VIGILANTE OSCURO*\n\n` +
        `Cazador ${hunterId}, has sido seleccionado para una misión exclusiva:\n\n` +
        `"${missionType}"\n\n` +
        `Para verificar tu cumplimiento en tiempo real, necesito realizar una videollamada de supervisión.\n\n` +
        `✅ *¿AUTORIZAS la videollamada de verificación?*\n\n` +
        `Responde:\n` +
        `- *SÍ* para autorizar\n` +
        `- *NO* para cancelar la misión\n\n` +
        `⚠️ Esta verificación es obligatoria para completar la misión y recibir tu recompensa.`
      );
      
      window.open(`https://wa.me/54${numeroSoporte}?text=${mensaje}`, '_blank');
      
      // Actualizar estado en Firebase
      const verificationKey = `${hunterId}_verification_${Date.now()}`;
      db.ref(`verificaciones/${verificationKey}`).set({
        hunterId: hunterId,
        missionType: missionType,
        status: 'consentimiento_solicitado',
        requested_by: auth.currentUser.uid,
        timestamp: Date.now()
      });
    }

    // === APROBAR MISIÓN ===
    function aprobarMision() {
      const hunterId = document.getElementById('hunterIdVerify').value.trim().toUpperCase();
      
      if (!hunterId) {
        alert('⚠️ Selecciona un cazador para aprobar');
        return;
      }
      
      if (confirm(`¿Estás seguro de aprobar la misión de ${hunterId}?`)) {
        // Buscar la misión asignada
        db.ref('misiones_asignadas').orderByChild('hunterId').equalTo(hunterId).once('value')
          .then((snapshot) => {
            if (!snapshot.exists()) {
              alert('❌ Misión no encontrada');
              return;
            }
            
            const assignments = snapshot.val();
            const assignmentKey = Object.keys(assignments)[0];
            
            // Actualizar estado a aprobado
            db.ref(`misiones_asignadas/${assignmentKey}`).update({
              status: 'approved',
              approved_by: auth.currentUser.uid,
              approved_at: Date.now()
            })
            .then(() => {
              alert(`✅ Misión de ${hunterId} aprobada exitosamente`);
              loadAssignedMissions();
            })
            .catch(error => {
              console.error('Error al aprobar misión:', error);
              alert('❌ Error al aprobar misión');
            });
          });
      }
    }

    // === RECHAZAR MISIÓN ===
    function rechazarMision() {
      const hunterId = document.getElementById('hunterIdVerify').value.trim().toUpperCase();
      
      if (!hunterId) {
        alert('⚠️ Selecciona un cazador para rechazar');
        return;
      }
      
      const reason = prompt(`¿Por qué rechazas la misión de ${hunterId}?`);
      if (reason) {
        // Buscar la misión asignada
        db.ref('misiones_asignadas').orderByChild('hunterId').equalTo(hunterId).once('value')
          .then((snapshot) => {
            if (!snapshot.exists()) {
              alert('❌ Misión no encontrada');
              return;
            }
            
            const assignments = snapshot.val();
            const assignmentKey = Object.keys(assignments)[0];
            
            // Actualizar estado a rechazado
            db.ref(`misiones_asignadas/${assignmentKey}`).update({
              status: 'rejected',
              rejected_by: auth.currentUser.uid,
              rejection_reason: reason,
              rejected_at: Date.now()
            })
            .then(() => {
              alert(`❌ Misión de ${hunterId} rechazada`);
              loadAssignedMissions();
            })
            .catch(error => {
              console.error('Error al rechazar misión:', error);
              alert('❌ Error al rechazar misión');
            });
          });
      }
    }

    // === ACTUALIZACIÓN EN TIEMPO REAL ===
    function setupRealtimeUpdates() {
      // Escuchar nuevas misiones asignadas
      db.ref('misiones_asignadas').on('child_added', (snapshot) => {
        loadAssignedMissions();
      });
    }

    // Iniciar actualizaciones en tiempo real
    setupRealtimeUpdates();
  </script>
</body>
</html>
