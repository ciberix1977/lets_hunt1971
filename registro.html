<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro · Codigo Ebel</title>
  <meta name="description" content="Únete a la cacería urbana en el Gran Buenos Aires. Gratis. Inmersivo. Real." />
  
  <!-- ✅ PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0066ff">
  
  <!-- Firebase SDK (legacy v8.10.1) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="index.html" class="back-link" aria-label="Volver a la página principal">
    ← Volver a Inicio
  </a>

  <div class="form-card mission-card" data-type="registro">
    <div class="logo-container centered">
      <img src="code_ebel3.webp" alt="Codigo Ebel">
    </div>

    <h1 class="section-title">🔐 Regístrate con WhatsApp</h1>
    <p class="subtitle">
      Tu número de WhatsApp será tu identidad única en Codigo Ebel.
    </p>

    <form id="registroForm">
      <div class="form-group">
        <label for="telefono">📱 Número de WhatsApp (10 dígitos) *</label>
        <input 
          type="tel" 
          id="telefono" 
          name="telefono"
          required
          inputmode="numeric"
          pattern="[0-9]{10}"
          placeholder="1112345678"
          title="Solo 10 dígitos. Ej: 1112345678">
        <p class="privacy-note">Usamos WhatsApp para enviar pistas y verificar tu identidad. Solo números móviles argentinos (+549...).</p>
      </div>

      <!-- ✅ Modo de juego -->
      <div class="form-group">
        <label>¿Cómo querés jugar? *</label>
        <div class="modo-radio-group">
          <label>
            <input type="radio" name="modo" value="individual" checked required>
            🧍‍♂️ Solo (3 misiones)
          </label>
          <label>
            <input type="radio" name="modo" value="equipo" required>
            👥 Equipo (4+ misiones)
          </label>
        </div>
      </div>

      <div class="form-group equipo-info">
        <label for="codigo-equipo">Código de equipo (opcional)</label>
        <input 
          type="text" 
          id="codigo-equipo" 
          name="codigo_equipo"
          placeholder="Ej: ALPHA7"
          maxlength="7"
          pattern="[A-Z]{4}[0-9]{3}"
          title="4 letras mayúsculas + 3 números. Ej: HUNT245">
        <p class="privacy-note">¿No tenés código? ¡Podés crear un equipo nuevo después del registro!</p>
      </div>

      <div class="form-group">
        <label for="zona">Zona de juego *</label>
        <select id="zona" name="zona" required>
          <option value="">Selecciona tu zona...</option>
          <option value="CABA">📍 Ciudad de Buenos Aires (CABA)</option>
          <option value="Avellaneda">🚂 Avellaneda (incluye Dock Sud, Wilde, Sarandí)</option>
          <option value="Lanús">🌳 Lanús (incluye Remedios de Escalada, Valentín Alsina)</option>
          <option value="Lomas de Zamora">🏘️ Lomas de Zamora (incluye Banfield, Temperley, Llavallol)</option>
        </select>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input 
            type="checkbox" 
            id="consent" 
            required>
          Acepto los <a href="politicas.html#terminos" target="_blank" rel="noopener">Términos</a> y la 
          <a href="politicas.html#privacidad" target="_blank" rel="noopener">Política de Privacidad</a> *
        </label>
      </div>

      <button type="submit" class="btn-hero" id="submitBtn">
        🔒 Registrarme con WhatsApp
      </button>
    </form>
  </div>

  <script>
  // ========== FIREBASE ==========
  const firebaseConfig = {
    apiKey: "AIzaSyDvMo1LPD_FGk-Ahju8oN7WEn9w0B5bqUE",
    authDomain: "let-s-hunt.firebaseapp.com",
    databaseURL: "https://let-s-hunt-default-rtdb.firebaseio.com",
    projectId: "let-s-hunt",
    storageBucket: "let-s-hunt.firebasestorage.app",
    messagingSenderId: "787017812046",
    appId: "1:787017812046:web:da098b2361df4dda995b1f"
  };
  
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // Mostrar/ocultar campo de equipo
  document.querySelectorAll('input[name="modo"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const equipoInfo = document.querySelector('.equipo-info');
      if (radio.value === 'equipo') {
        equipoInfo.classList.add('show');
      } else {
        equipoInfo.classList.remove('show');
      }
    });
  });

  // Generar código único
  function generarCodigoEquipo() {
    const letras = "BCDFGHJKMNPQRSTVWXYZ";
    const nums = "23456789";
    let codigo = "";
    for (let i = 0; i < 4; i++) 
      codigo += letras.charAt(Math.floor(Math.random() * letras.length));
    for (let i = 0; i < 3; i++) 
      codigo += nums.charAt(Math.floor(Math.random() * nums.length));
    return codigo;
  }

  // Validar número argentino
  function validarNumeroArgentino(phone) {
    const phoneRegex = /^[0-9]{10}$/;
    return phoneRegex.test(phone);
  }

  // Manejar envío SIN verificación por WhatsApp
  document.getElementById('registroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    let telefonoRaw = document.getElementById('telefono').value.trim().replace(/\D/g, '');
    const zona = document.getElementById('zona').value;
    const modo = document.querySelector('input[name="modo"]:checked').value;
    const codigoIngresado = modo === 'equipo' 
      ? document.getElementById('codigo-equipo').value.trim().toUpperCase() 
      : null;

    if (!validarNumeroArgentino(telefonoRaw)) {
      alert('⚠️ El número debe tener 10 dígitos (sin código de país). Ej: 1112345678');
      return;
    }

    if (!zona) {
      alert('⚠️ Por favor, selecciona una zona de juego.');
      return;
    }

    if (modo === 'equipo' && codigoIngresado) {
      if (!/^[A-Z]{4}[0-9]{3}$/.test(codigoIngresado)) {
        alert('⚠️ Código inválido. Debe ser 4 letras + 3 números. Ej: HUNT245');
        return;
      }
    }

    const telefonoWhatsapp = `+549${telefonoRaw}`;

    // Generar hunterId SECUENCIAL con prefijo LH
    let lastId = parseInt(localStorage.getItem('lastHunterId') || '0');
    let newId = lastId + 1;
    let hunterId = `LH-${String(newId).padStart(4, '0')}`;
    localStorage.setItem('lastHunterId', newId);

    let equipo = null;
    if (modo === 'equipo') {
      if (!codigoIngresado) {
        equipo = generarCodigoEquipo();
      } else {
        equipo = codigoIngresado;
      }
    }

    const jugador = { 
      id: hunterId, 
      telefono: telefonoWhatsapp, 
      zona, 
      modo, 
      equipo,
      whatsapp_verified: true // Marcado como verificado inmediatamente
    };
    localStorage.setItem(`jugador_${hunterId}`, JSON.stringify(jugador));
    localStorage.setItem('currentHunterId', hunterId);

    // Guardar en Firebase
    try {
      await db.ref(`jugadores/${hunterId}`).set({
        hunterId: hunterId,
        telefono: telefonoWhatsapp,
        zona: zona,
        modo: modo,
        equipo: equipo,
        fecha_registro: Date.now(),
        activo: true,
        whatsapp_verified: true
      });
    } catch (error) {
      console.error("Error al guardar en Firebase:", error);
    }

    // ✅ Feedback emocional inmediato + redirección directa
    const container = document.querySelector('.form-card');
    container.innerHTML = `
      <div class="logo-container centered">
        <img src="code_ebel3.webp" alt="Codigo Ebel">
      </div>
      <div class="registration-ritual" style="text-align:center; margin-top:1.5rem;">
        ✅ <span style="color: #4ade80;">¡Registro exitoso!</span><br>
        <span style="font-size: 1.4rem; margin: 0.4rem 0; display: block; color: #fff;">${hunterId.toUpperCase()}</span>
        <span style="font-size: 0.95rem; opacity: 0.85; display: block; margin-top: 0.5rem;">
          Tu cuenta está activa.<br>
          <!-- 🎖️ BENEFICIO INMEDIATO AL REGISTRARTE -->
          <div class="instant-reward register-reward" style="margin:1rem 0;">
            <h3 style="margin-bottom: 0.4rem;">🎖️ Al registrarte ahora</h3>
            <ul style="list-style: none; padding: 0; margin: 0.6rem 0;">
              <li>📡 Tu alias aparece en el <strong>radar en vivo</strong>.</li>
              <li>🎯 Desbloqueás tu <strong>primer desafío</strong>.</li>
              <li>🏷️ Recibís el badge <strong>“Primer Cazador”</strong>.</li>
            </ul>
            <p style="font-size: 0.85rem; opacity: 0.85;">
              No necesitás ganar el ranking para empezar a jugar.
            </p>
          </div>
          🟢 <span id="live-count-ritual">24</span> cazadores en el GBA ahora.
        </span>
      </div>
    `;

    // Simular contador
    function updateRitualCounter() {
      const base = 20;
      const fluctuation = Math.floor(Math.random() * 8);
      document.getElementById('live-count-ritual').textContent = base + fluctuation;
    }
    updateRitualCounter();
    setInterval(updateRitualCounter, 3000);

    // Redirigir a app.html
    setTimeout(() => {
      window.location.href = `app.html?id=${encodeURIComponent(hunterId)}&zona=${encodeURIComponent(zona)}`;
    }, 1500);
  });
  </script>
</body>
</html>
