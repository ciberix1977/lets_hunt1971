<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codigo Ebel · Próximamente</title>
  <meta name="description" content="Let's Hunt: La cacería urbana está pronto a comenzar en el Gran Buenos Aires." />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0a0a12 0%, #000 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    
    .logo-container {
      margin-bottom: 2rem;
    }
    
    .logo {
      max-width: 80vw;
      max-height: 60vh;
      height: auto;
      width: auto;
      /* Filtro eliminado - tu logo se verá en sus colores originales */
      animation: fadeIn 1.2s ease-out;
    }
    
    .coming-soon {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.4;
      background: linear-gradient(90deg, #0af, #64b5f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 4px rgba(0, 170, 255, 0.1);
      animation: fadeIn 1.5s ease-out 0.3s both;
    }
    
    .domain {
      font-size: 1.1rem;
      opacity: 0.7;
      margin-top: 1.5rem;
      animation: fadeIn 1.8s ease-out 0.6s both;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 768px) {
      .coming-soon {
        font-size: 1.4rem;
        padding: 0 1rem;
      }
      
      .domain {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="code_ebel3.webp" alt="Codigo Ebel" class="logo" onerror="this.src='code_ebel3.png'; this.onerror=null;">
  </div>
  
  <h1 class="coming-soon">
  <br>
    La cacería está pronto a comenzar
  </h1>
  
  <p class="domain">codigoebel.com</p>
</body>
</html>
