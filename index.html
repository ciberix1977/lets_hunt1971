<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codigo Ebel · La ciudad ya está en juego</title>
  <meta name="description" content="Una aventura urbana en el Gran Buenos Aires. Próximamente." />
  
  <!-- Open Graph para redes sociales -->
  <meta property="og:title" content="Codigo Ebel · La ciudad ya está en juego" />
  <meta property="og:description" content="Una aventura urbana en el Gran Buenos Aires. Próximamente." />
  <meta property="og:image" content="https://codigoebel.com/og-image.jpg" />
  <meta property="og:type" content="website" />
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Exo 2', system-ui, -apple-system, sans-serif;
      background: #0a0e17;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      line-height: 1.5;
    }
    
    .logo {
      max-width: 200px;
      margin-bottom: 2rem;
      animation: pulse 3s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 100, 0.3)); }
      50% { filter: drop-shadow(0 0 35px rgba(0, 255, 100, 0.6)); }
    }
    
    .phrase {
      font-size: 1.6rem;
      font-weight: 700;
      color: #00ff64;
      margin: 1rem 0 2rem;
      text-shadow: 0 0 20px rgba(0, 255, 100, 0.3);
      line-height: 1.3;
    }
    
    .subtitle {
      color: #9ca3af;
      max-width: 400px;
      margin: 0 auto 2rem;
      font-size: 1.05rem;
    }
    
    .counter {
      background: rgba(0, 255, 100, 0.1);
      border: 1px solid rgba(0, 255, 100, 0.3);
      border-radius: 12px;
      padding: 0.6rem 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    
    .pulse-dot {
      width: 8px;
      height: 8px;
      background: #0f0;
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }
    
    .waitlist-form {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 320px;
      margin: 0 auto;
    }
    
    .waitlist-form input {
      flex: 1;
      min-width: 180px;
      padding: 0.7rem 1rem;
      border: 2px solid #374151;
      border-radius: 8px;
      background: #111827;
      color: #f3f4f6;
      font-size: 1rem;
    }
    
    .waitlist-form input:focus {
      outline: none;
      border-color: #00ff64;
    }
    
    .waitlist-btn {
      background: linear-gradient(135deg, #00ff64, #00aa88);
      color: #000;
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }
    
    .waitlist-btn:hover {
      transform: translateY(-1px);
    }
    
    .note {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 0.75rem;
      max-width: 300px;
    }
    
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #374151;
      font-size: 0.85rem;
      color: #6b7280;
    }
    
    footer a {
      color: #00ff64;
      text-decoration: none;
    }
    
    .social-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.5rem;
    }
    
    .social-links a {
      color: #9ca3af;
      font-size: 1.2rem;
      transition: color 0.2s;
    }
    
    .social-links a:hover {
      color: #00ff64;
    }
    
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #00ff64;
      color: #000;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    
    #toast.show {
      opacity: 1;
    }
    
    @media (max-width: 480px) {
      .phrase { font-size: 1.3rem; }
      .subtitle { font-size: 1rem; }
      .waitlist-form { flex-direction: column; }
      .waitlist-form input { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Logo -->
  <img src="./code_ebel3.webp" alt="Code Ebel" class="logo" loading="eager">
  
  <!-- Frase principal (UNA de las 5 recomendadas) -->
  <h1 class="phrase">Code Ebel — La ciudad ya está en juego</h1>
  
  <!-- Subtítulo explicativo -->
  <p class="subtitle">
    Una aventura urbana en el Gran Buenos Aires. 
    <strong>Próximamente.</strong>
  </p>
  
  <!-- Contador de espera (prueba social) -->
  <div class="counter">
    <span class="pulse-dot"></span>
    🟢 <span id="count">1,247</span> en lista de espera
  </div>
  
  <!-- Formulario minimalista -->
  <form class="waitlist-form" id="waitlistForm">
    <input 
      type="email" 
      placeholder="Tu email" 
      required
      pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
      aria-label="Tu email">
    <button type="submit" class="waitlist-btn" id="btn">🔔 Avísame</button>
  </form>
  <p class="note">🔒 Solo te avisaremos cuando esté listo.</p>
  
  <!-- Footer minimal -->
  <footer>
    <p>&copy; <span id="year">2025</span> Codigo Ebel</p>
    <div class="social-links">
      <a href="https://instagram.com/codigo_ebel.ok" target="_blank" rel="noopener" aria-label="Instagram">📸</a>
      <a href="https://x.com/@letshunt_BsAs" target="_blank" rel="noopener" aria-label="X">𝕏</a>
      <a href="https://tiktok.com/@codigoebel" target="_blank" rel="noopener" aria-label="TikTok">🎵</a>
    </div>
  </footer>
  
  <!-- Toast -->
  <div id="toast"></div>
  
  <script>
    // Año dinámico
    document.getElementById('year').textContent = new Date().getFullYear();
    
    // Contador fluctuante (prueba social)
    function updateCount() {
      const base = 1247;
      const fluctuation = Math.floor(Math.random() * 15) - 3;
      document.getElementById('count').textContent = (base + fluctuation).toLocaleString('es-AR');
      setTimeout(updateCount, 6000 + Math.random() * 4000);
    }
    updateCount();
    
    // Formulario de lista de espera
    document.getElementById('waitlistForm')?.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = this.querySelector('input').value;
      const btn = document.getElementById('btn');
      
      btn.disabled = true;
      btn.textContent = '✅';
      
      const toast = document.getElementById('toast');
      toast.textContent = '🎯 ¡Gracias! Te avisaremos.';
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
        this.reset();
        btn.disabled = false;
        btn.textContent = '🔔 Avísame';
      }, 4000);
      
      // ✅ Aquí podrías enviar el email a tu backend
      console.log('📧 Email capturado:', email);
    });
  </script>
</body>
</html>
